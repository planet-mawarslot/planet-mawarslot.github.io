        }

        .screen-inner::before {

            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(#fff0 50%, rgb(0 0 0 / .25) 50%), linear-gradient(90deg, rgb(255 0 0 / .06), rgb(0 255 0 / .02), rgb(0 0 255 / .06));
